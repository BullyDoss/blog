name = "blog-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "production"
CORS_ORIGIN = "https://bullydoss.com"
# GitHub OAuth 配置 (通过 secrets 设置)
# wrangler secret put GITHUB_CLIENT_ID
# wrangler secret put GITHUB_CLIENT_SECRET

[[d1_databases]]
binding = "DB"
database_name = "blog-db"
database_id = "790e82a4-170b-473e-8b0d-09f0f7d3aa04"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "blog-images"
